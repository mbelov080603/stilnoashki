<svg width="1440" height="820" viewBox="0 0 1440 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">STILNO coverage status card</title>
  <desc id="desc">A dark premium B2B status panel for stores page without fake map points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
