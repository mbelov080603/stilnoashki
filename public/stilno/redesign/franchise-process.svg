<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">STILNO franchise process</title>
<desc id="desc">Eight-step franchise process diagram in a premium monochrome style.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1440" y1="0" y2="760" gradientUnits="userSpaceOnUse"><stop stop-color="#0A0E14"/><stop offset="1" stop-color="#151D27"/></linearGradient>
</defs>
<rect width="1440" height="760" rx="46" fill="url(#bg)"/>
<g opacity="0.18">
  <path d="M120 160H1320" stroke="#FFFFFF"/>
  <path d="M120 380H1320" stroke="#FFFFFF"/>
  <path d="M120 600H1320" stroke="#FFFFFF"/>
  <path d="M260 80V680" stroke="#FFFFFF"/>
  <path d="M520 80V680" stroke="#FFFFFF"/>
  <path d="M780 80V680" stroke="#FFFFFF"/>
  <path d="M1040 80V680" stroke="#FFFFFF"/>
</g>
<text x="120" y="110" fill="#F5F7FA" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.5">Путь партнёра</text>
<text x="120" y="150" fill="#AAB3BE" font-family="Inter, Arial, sans-serif" font-size="20">Прозрачный процесс без обещаний окупаемости и без публичной оферты.</text>
<g font-family="Inter, Arial, sans-serif">
  <g transform="translate(120 224)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">01 · Заявка</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Город, формат, контакты</text>
  </g>
  <g transform="translate(426 224)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">02 · Контакт</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Первичный разговор</text>
  </g>
  <g transform="translate(732 224)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">03 · Город</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Проверка региона</text>
  </g>
  <g transform="translate(1038 224)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">04 · Формат</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Опт / франшиза / розница</text>
  </g>
  <g transform="translate(120 422)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">05 · Условия</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Индивидуальное согласование</text>
  </g>
  <g transform="translate(426 422)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">06 · Договор</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Отдельная письменная сделка</text>
  </g>
  <g transform="translate(732 422)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">07 · Подготовка</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Материалы и запуск</text>
  </g>
  <g transform="translate(1038 422)">
    <rect width="278" height="142" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="42" fill="#F5F7FA" font-size="20" font-weight="650">08 · Старт</text><text x="24" y="82" fill="#AAB3BE" font-size="16">Работа по стандарту STILNO</text>
  </g>
</g>
<text x="120" y="646" fill="#788391" font-family="Inter, Arial, sans-serif" font-size="16">Информация не является публичной офертой. Условия партнёрства обсуждаются индивидуально.</text>
</svg>
